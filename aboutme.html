<!-- SCRIPT (unchanged) -->
<script>
  const defaultAbout = {
    name: "Sin TongHout",
    image: "https://ui-avatars.com/api/?name=Hout",
    desc1: "I am a passionate student studying IT and Biology.",
    desc2:
      "I love building modern web applications and learning new technologies.",
    skills: ["HTML", "CSS", "JavaScript", "Bootstrap", "Tailwind"],
  };

  function getAbout() {
    let data = localStorage.getItem("about");
    if (!data) {
      localStorage.setItem("about", JSON.stringify(defaultAbout));
      return defaultAbout;
    }
    return JSON.parse(data);
  }

  function loadAbout() {
    let a = getAbout();

    aboutName.querySelector("span").innerText = a.name;
    aboutDesc1.innerText = a.desc1;
    aboutDesc2.innerText = a.desc2;
    aboutImage.src = a.image;

    skillsList.innerHTML = "";
    a.skills.forEach((s) => {
      skillsList.innerHTML += `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">${s}</span>`;
    });

    inName.value = a.name;
    inDesc1.value = a.desc1;
    inDesc2.value = a.desc2;
    inSkills.value = a.skills.join(",");
  }

  function openEdit() {
    editModal.classList.remove("hidden");
  }
  function closeEdit() {
    editModal.classList.add("hidden");
  }

  async function saveAbout() {
    let file = inImageFile.files[0];
    let img = inImageURL.value || getAbout().image;

    if (file) {
      img = await new Promise((res) => {
        let r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsDataURL(file);
      });
    }

    let data = {
      name: inName.value,
      image: img,
      desc1: inDesc1.value,
      desc2: inDesc2.value,
      skills: inSkills.value.split(",").map((s) => s.trim()),
    };

    localStorage.setItem("about", JSON.stringify(data));
    location.reload();
  }

  loadAbout();
</script>
